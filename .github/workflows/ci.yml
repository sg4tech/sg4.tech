name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm run security:audit

      - name: Security static analysis
        run: npm run security:code

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Knip
        run: npm run knip

      - name: Dependency cruiser
        run: npm run depcruise

      - name: Build
        run: npm run build
